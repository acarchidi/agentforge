version: '3.8'

services:
  agentforge:
    build: .
    ports:
      - '3402:3402'
    env_file:
      - .env
    volumes:
      - agentforge-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3402/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  agentforge-data:
